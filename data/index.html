<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOCA-DISCOS - SVG</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style2.css">
  
</head>
<body>

  <div class="container">
    <div class="header">GIRA</div>

    <svg class="turntable-svg" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" id="turntableSVG">

      <!-- Base -->
      <rect x="30" y="30" width="320" height="320" rx="20" fill="#1a1a1a" stroke="#444" stroke-width="12"/>

      <!-- Prato fixo -->
      <circle cx="190" cy="190" r="135" fill="#111" stroke="#222" stroke-width="25"/>

      <!-- Disco giratório -->
      <g id="discGroup">
        <!-- Ranhuras do vinil -->
        <circle cx="190" cy="190" r="118" fill="none" stroke="#222" stroke-width="8"/>
        <circle cx="190" cy="190" r="105" fill="none" stroke="#1f1f1f" stroke-width="6"/>
        <circle cx="190" cy="190" r="92"  fill="none" stroke="#222" stroke-width="5"/>
        <circle cx="190" cy="190" r="78"  fill="none" stroke="#1f1f1f" stroke-width="4"/>
        
        <!-- Centro do disco -->
        <circle cx="190" cy="190" r="28" fill="#0a0a0a"/>
        <circle cx="190" cy="190" r="18" fill="#333"/>
        <text x="190" y="194" font-size="11" fill="#666" text-anchor="middle" font-weight="600">G·I·R·A</text>
      </g>

      <!-- Braço (Tonearm) -->
      <g id="tonearmGroup" style="transform-origin: 305px 95px;">
        <!-- Suporte do braço -->
        <rect x="290" y="65" width="28" height="45" rx="8" fill="#222" stroke="#444" stroke-width="6"/>
        
        <!-- Braço principal -->
        <line x1="305" y1="95" x2="305" y2="240" stroke="#ff6600" stroke-width="11" stroke-linecap="round"/>
        
        <!-- Cabeça do cartucho -->
        <polygon points="290,235 320,235 325,250 285,250" fill="#1a1a1a" stroke="#ff6a00" stroke-width="6"/>
        
        <!-- Agulha -->
        <line x1="305" y1="250" x2="317" y2="267" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
      </g>

    </svg>

    <!-- Controles -->
    <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 25px;">
      
      <!-- Painel Motor & Rotação -->
      <div style="background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:20px;">
        <h3 style="margin-bottom:15px; color:#888; font-size:0.95rem; letter-spacing:1px;">MOTOR & ROTAÇÃO</h3>
        
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:18px;">
          <div id="motorToggle" style="width:60px; height:32px; background:#333; border-radius:50px; position:relative; cursor:pointer;">
            <div id="toggleKnob" style="position:absolute; top:3px; left:3px; width:26px; height:26px; background:white; border-radius:50%; transition:0.3s;"></div>
          </div>
          <div>
            <div id="motorText" style="font-weight:600; color:#ff6a00;">LIGAR MOTOR</div>
            <div style="font-size:0.82rem; color:#666;">DESLIGAR MOTOR</div>
          </div>
        </div>

        <div style="display:flex; gap:0px;">
        <button id="rpm33" class="rpm-btn active" style="border-top-right-radius: 0px;border-bottom-right-radius: 0px;">33⅓ RPM</button>
          <button id="rpm45" class="rpm-btn" style="border-top-left-radius: 0px;border-bottom-left-radius: 0px;">45 RPM</button>
        </div>

        <!-- Novo: Modo Manual / Automático -->
        <div class="mode-container">
          <div class="mode-label">MODO DE FUNCIONAMENTO</div>
          <div style="display:flex; gap:10px;">
            <button id="modeManual" class="mode-btn active">MANUAL</button>
            <button id="modeAuto" class="mode-btn">AUTOMÁTICO</button>
          </div>
        </div>
      </div>

      <!-- Controle do Lift -->
      <div style="background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:20px;">
        <h3 style="margin-bottom:15px; color:#888; font-size:0.95rem; letter-spacing:1px;">CONTROLE DO LIFT</h3>
        
        <div style="display:flex; gap:12px; margin-bottom:15px;">
          <button id="liftUp"   style="flex:1; height:55px; font-size:1.8rem; border:none; border-radius:12px; background:#222; color:white;">↑</button>
          <button id="liftDown" style="flex:1; height:55px; font-size:1.8rem; border:none; border-radius:12px; background:#222; color:#aaa;">↓</button>
        </div>

        <div>
          <input type="range" id="liftSlider" min="30" max="150" value="91" style="width:100%; accent-color:#ff6a00;">
          <div style="text-align:center; margin-top:8px; font-size:0.9rem; color:#888;">
            Posição atual: <span id="liftValue">91°</span>
          </div>
        </div>
      </div>
    </div>

    <div style="text-align:center; margin-top:30px;">
      <button id="advancedBtn" style="background:#3498db; color:white; border:none; padding:14px 36px; border-radius:8px; font-weight:600; cursor:pointer;">
        ⚙️ CONFIGURAÇÕES AVANÇADAS
      </button>
    </div>
  </div>

  <script src="script2.js"></script>
</body>
</html>
